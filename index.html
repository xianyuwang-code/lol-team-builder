<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>海克斯大乱斗 · 本地皮肤版 | 手动翻牌随机组队</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
            padding: 2rem 1.5rem;
            color: #eef5ff;
            position: relative;
            overflow-x: auto;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 45px 45px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .hextech-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .hextech-header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F5E56B, #FFB347, #3cc7ff, #1e88e5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sub {
            font-size: 0.95rem;
            background: rgba(0, 30, 50, 0.65);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            margin-top: 8px;
        }

        /* 在线选手管理面板 */
        .online-panel {
            background: rgba(8, 18, 28, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding-bottom: 0.6rem;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-actions {
            display: flex;
            gap: 12px;
        }

        .online-btn {
            background: #0f212e;
            border: 1px solid #0ff8;
            color: #b9f3ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .online-btn:hover {
            background: #1a3a4e;
            border-color: #ffd966;
            color: #fff;
        }

        .players-check-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            max-height: 140px;
            overflow-y: auto;
            padding: 0.2rem 0;
        }

        .check-item {
            background: #0f1725;
            border-radius: 40px;
            padding: 0.3rem 0.8rem 0.3rem 0.6rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 200, 255, 0.3);
            cursor: pointer;
        }

        .check-item:hover {
            background: #1a2538;
            border-color: #ffd966;
        }

        .check-item input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #3cc7ff;
        }

        .check-item label {
            cursor: pointer;
            color: #eef5ff;
            white-space: nowrap;
        }

        .online-stats {
            font-size: 0.8rem;
            color: #7bc9ff;
            margin-left: auto;
            background: rgba(0,0,0,0.4);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        /* 队伍布局 */
        .team-row {
            margin-bottom: 2rem;
            background: rgba(8, 18, 28, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem 1rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
        }

        .team-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding: 0 0.5rem;
        }

        .team-name {
            font-size: 1.7rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .blue .team-name { color: #7bc9ff; text-shadow: 0 0 4px #0080ff; }
        .red .team-name { color: #ff7e6b; text-shadow: 0 0 4px #ff3a2f; }

        .team-badge {
            background: #0a1424cc;
            padding: 0.2rem 0.9rem;
            border-radius: 60px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,215,0,0.5);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
        }

        .player-card {
            background: linear-gradient(145deg, #0f1725, #070e18);
            border-radius: 1.2rem;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid rgba(0, 200, 255, 0.3);
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            aspect-ratio: 3 / 4;
        }

        .player-card:hover {
            transform: translateY(-5px);
            border-color: #ffd966;
        }

        .card-back {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #1a2a3a, #03070f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            color: #ffd966;
        }

        .card-back .hex-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 6px cyan);
        }

        .card-back span {
            background: rgba(0,0,0,0.6);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .card-front {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .splash-area {
            flex: 3;
            background: #0a0f1a;
            overflow: hidden;
        }

        .splash-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .player-card:hover .splash-img {
            transform: scale(1.03);
        }

        .player-info {
            padding: 0.8rem 0.5rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            border-top: 1px solid rgba(255, 215, 0, 0.3);
        }

        .player-name {
            font-size: 0.85rem;
            font-weight: 600;
            font-family: monospace;
            word-break: break-word;
            color: #f0f3fa;
        }

        .skin-label {
            font-size: 0.65rem;
            color: #ffd966;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 替补席 */
        .bench-section {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
            border: 1px solid rgba(255, 193, 7, 0.4);
        }

        .bench-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffcd7e;
            border-left: 4px solid #ffb347;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }

        .bench-players {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .bench-player {
            background: #1f2a36;
            border-radius: 60px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            gap: 0;
            border: 1px solid #ffb34780;
            cursor: pointer;
            overflow: hidden;
            min-width: 160px;
        }

        .bench-player:hover {
            transform: translateY(-2px);
            border-color: #ffd966;
        }

        .bench-back {
            width: 100%;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #0f1725;
            color: #ffd966;
        }

        .bench-front {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 0.4rem 1rem;
        }

        .bench-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            overflow: hidden;
            background: #0e1a24;
            flex-shrink: 0;
        }

        .bench-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bench-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .bench-player-name {
            font-weight: 600;
            font-size: 0.75rem;
        }

        .bench-skin {
            font-size: 0.65rem;
            color: #ffcd7e;
        }

        @keyframes flipReveal {
            0% { transform: perspective(400px) rotateY(0deg); opacity: 0.8; }
            40% { transform: perspective(400px) rotateY(90deg); }
            70% { transform: perspective(400px) rotateY(-10deg); }
            100% { transform: perspective(400px) rotateY(0deg); opacity: 1; }
        }

        .flip-reveal {
            animation: flipReveal 0.35s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .randomize-btn {
            display: flex;
            justify-content: center;
            margin: 2rem 0 1.2rem;
        }

        .hex-button {
            background: linear-gradient(105deg, #10212e, #030e17);
            border: 2px solid #0ff9;
            color: #dcf5ff;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 0.9rem 2.6rem;
            border-radius: 60px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: inline-flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 0 10px #0ff6;
        }

        .hex-button:hover {
            transform: scale(1.02);
            background: linear-gradient(105deg, #1a3a4e, #08131f);
            border-color: #ffcd7e;
            color: #fff3cf;
        }

        .hex-button:active {
            transform: scale(0.97);
        }

        @media (max-width: 1000px) {
            .players-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
            .team-name { font-size: 1.4rem; }
        }
        @media (max-width: 700px) {
            .players-grid { grid-template-columns: repeat(2, 1fr); }
            .hex-button { font-size: 1rem; padding: 0.6rem 1.2rem; }
            .bench-player { min-width: 140px; }
        }
        .footer-stats {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #7d9bc3;
            background: rgba(0,0,0,0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
        }
        .warning-text {
            color: #ffaa66;
            font-size: 0.75rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hextech-header">
        <h1>海克斯大乱斗 · 本地皮肤版</h1>
        <div class="sub">⚙️ 勾选在线选手 → 随机组队 → 点击卡牌翻牌 ⚙️</div>
    </div>

    <!-- 在线选手管理面板 -->
    <div class="online-panel">
        <div class="panel-header">
            <div class="panel-title"><span>🟢</span> 在线选手池 (仅勾选者参与随机)</div>
            <div class="online-actions">
                <button class="online-btn" id="selectAllBtn">✓ 全选</button>
                <button class="online-btn" id="deselectAllBtn">✗ 全不选</button>
                <span id="onlineCountDisplay" class="online-stats">在线: 12/12</span>
            </div>
        </div>
        <div class="players-check-list" id="playersCheckList"></div>
        <div class="warning-text" id="onlineWarning"></div>
    </div>

    <!-- 蓝队 -->
    <div class="team-row blue">
        <div class="team-title">
            <div class="team-name"><span>🔷</span> 蓝方阵营</div>
            <div class="team-badge">⚔️ 5 人 ⚔️</div>
        </div>
        <div class="players-grid" id="blueTeamGrid"></div>
    </div>

    <!-- 红队 -->
    <div class="team-row red">
        <div class="team-title">
            <div class="team-name"><span>🔴</span> 红方阵营</div>
            <div class="team-badge">🔥 5 人 🔥</div>
        </div>
        <div class="players-grid" id="redTeamGrid"></div>
    </div>

    <!-- 替补席 -->
    <div class="bench-section">
        <div class="bench-header"><span>⏳</span> 替补席 · 待命英杰</div>
        <div class="bench-players" id="benchList"></div>
    </div>

    <div class="randomize-btn">
        <button class="hex-button" id="randomizeBtn">
            <span>🎲</span> 随机组队 · 重置卡牌 <span>🃟</span>
        </button>
    </div>
    <div class="footer-stats">
        💡 1. 勾选在线选手 | 2. 点击随机组队 | 3. 点击任意卡牌翻开英雄真容
    </div>
</div>

<script>
    // ======================= 选手数据 (本地皮肤路径) =======================
    const PLAYERS_DATA = [
        { id: "咸鱼丶汪#37673", skin: "至臻 神凰行者 烈羽焰凰 霞", championEn: "Xayah", splashUrl: "skins/咸鱼汪.tif" },
        { id: "机制的冬瓜茶#85459", skin: "西部魔影 锤石", championEn: "Thresh", splashUrl: "skins/机制的冬瓜茶.tif" },
        { id: "锦衣鸿归#73466", skin: "破败军团 德莱文", championEn: "Draven", splashUrl: "skins/锦衣鸿归.tif" },
        { id: "无糖真珠#14369", skin: "联盟不朽 阿狸", championEn: "Ahri", splashUrl: "skins/无糖真珠.tif" },
        { id: "Mr无绪#72876", skin: "双城之战2 幸存者 杰斯", championEn: "Jayce", splashUrl: "skins/Mr无绪.tif" },
        { id: "伊书尔德#17333", skin: "至臻 安魂曲 娑娜", championEn: "Sona", splashUrl: "skins/伊书尔德.tif" },
        { id: "DiuniLeimuzzZ#43665", skin: "背叛之刃 普朗克", championEn: "Gangplank", splashUrl: "skins/DiuniLeimuzzZ.tif" },
        { id: "Motish#31224", skin: "泡泡飘飘拳 布里茨", championEn: "Blitzcrank", splashUrl: "skins/motish.tif" },
        { id: "他不是蟹老板#18372", skin: "星之守护者 奥莉安娜", championEn: "Orianna", splashUrl: "skins/他不是蟹老板.tif" },
        { id: "三十五时#44212", skin: "至臻 青花瓷 拉克丝", championEn: "Lux", splashUrl: "skins/三十五时.tif" },
        { id: "TheShy#48863", skin: "至高天 布兰德", championEn: "Brand", splashUrl: "skins/theshy.tif" },
        { id: "有人在胡言乱语#29782", skin: "未来战士 伊泽瑞尔", championEn: "Ezreal", splashUrl: "skins/有人在胡言乱语.tif" }
    ];

    // 后备原画 (英雄基础原画，如果本地图片加载失败时使用)
    function getFallbackSplashUrl(championEn) {
        const champ = championEn.charAt(0).toUpperCase() + championEn.slice(1).toLowerCase();
        return `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champ}_0.jpg`;
    }

    let onlineStatus = new Map();
    function initOnlineStatus() {
        PLAYERS_DATA.forEach(p => onlineStatus.set(p.id, true));
    }
    function getOnlinePlayers() {
        return PLAYERS_DATA.filter(p => onlineStatus.get(p.id) === true);
    }
    function updateOnlineUI() {
        const onlineCount = getOnlinePlayers().length;
        const total = PLAYERS_DATA.length;
        document.getElementById('onlineCountDisplay').innerText = `在线: ${onlineCount}/${total}`;
        const warningDiv = document.getElementById('onlineWarning');
        if (onlineCount < 10) {
            warningDiv.innerText = `⚠️ 在线人数不足10人 (当前${onlineCount}人)，无法进行5v5组队！请勾选更多选手。`;
            warningDiv.style.color = "#ffaa66";
        } else if (onlineCount === 10) {
            warningDiv.innerText = `ℹ️ 在线人数正好10人，无替补选手。`;
            warningDiv.style.color = "#7bc9ff";
        } else {
            warningDiv.innerText = `✅ 在线人数充足，可组队 ${onlineCount >= 12 ? '满员12人' : `(含${onlineCount-10}名替补)`}`;
            warningDiv.style.color = "#a0ffa0";
        }
        const btn = document.getElementById('randomizeBtn');
        if (onlineCount < 10) btn.style.opacity = "0.6";
        else btn.style.opacity = "1";
    }

    function shuffleArray(arr) {
        const array = [...arr];
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateTeamsFromOnline() {
        const onlinePlayers = getOnlinePlayers();
        if (onlinePlayers.length < 10) {
            alert(`在线选手不足10人（当前${onlinePlayers.length}人），无法进行5v5组队，请增加在线人数。`);
            return null;
        }
        const shuffled = shuffleArray(onlinePlayers);
        const blueTeam = shuffled.slice(0, 5);
        const redTeam = shuffled.slice(5, 10);
        const substitutes = shuffled.slice(10);
        return { blueTeam, redTeam, substitutes };
    }

    function createBackCard(playerData) {
        const card = document.createElement('div');
        card.className = 'player-card';
        card.setAttribute('data-player', JSON.stringify(playerData));
        card.setAttribute('data-revealed', 'false');
        card.innerHTML = `<div class="card-back"><div class="hex-icon">⚡🔧</div><span>点击翻开</span></div>`;
        return card;
    }

    function getFrontHTML(player) {
        const skinDisplay = player.skin.length > 24 ? player.skin.slice(0,22)+"..." : player.skin;
        const imgUrl = player.splashUrl;
        const fallback = getFallbackSplashUrl(player.championEn);
        return `
            <div class="card-front">
                <div class="splash-area">
                    <img class="splash-img" src="${imgUrl}" alt="${escapeHtml(player.skin)}" loading="lazy"
                         onerror="this.onerror=null; this.src='${fallback}'; console.warn('本地皮肤加载失败，使用后备原画: ${player.id}');">
                </div>
                <div class="player-info">
                    <div class="player-name">${escapeHtml(player.id)}</div>
                    <div class="skin-label" title="${escapeHtml(player.skin)}">🎨 ${escapeHtml(skinDisplay)}</div>
                </div>
            </div>
        `;
    }

    function revealPlayerCard(cardElement) {
        if (cardElement.getAttribute('data-revealed') === 'true') return;
        const raw = cardElement.getAttribute('data-player');
        if (!raw) return;
        const player = JSON.parse(raw);
        const frontHTML = getFrontHTML(player);
        cardElement.classList.add('flip-reveal');
        cardElement.innerHTML = frontHTML;
        cardElement.setAttribute('data-revealed', 'true');
        setTimeout(() => cardElement.classList.remove('flip-reveal'), 400);
    }

    function createBackBench(playerData) {
        const bench = document.createElement('div');
        bench.className = 'bench-player';
        bench.setAttribute('data-player', JSON.stringify(playerData));
        bench.setAttribute('data-revealed', 'false');
        bench.innerHTML = `<div class="bench-back"><span class="hex-icon-small">🔮</span><span>点击翻开</span></div>`;
        return bench;
    }

    function getBenchFrontHTML(player) {
        const imgUrl = player.splashUrl;
        const fallback = getFallbackSplashUrl(player.championEn);
        const skinShort = player.skin.length > 18 ? player.skin.slice(0,16)+".." : player.skin;
        return `
            <div class="bench-front">
                <div class="bench-icon"><img src="${imgUrl}" onerror="this.onerror=null; this.src='${fallback}';"></div>
                <div class="bench-info">
                    <div class="bench-player-name">${escapeHtml(player.id)}</div>
                    <div class="bench-skin">${escapeHtml(skinShort)}</div>
                </div>
            </div>
        `;
    }

    function revealBenchCard(benchElement) {
        if (benchElement.getAttribute('data-revealed') === 'true') return;
        const raw = benchElement.getAttribute('data-player');
        if (!raw) return;
        const player = JSON.parse(raw);
        const frontHTML = getBenchFrontHTML(player);
        benchElement.classList.add('flip-reveal');
        benchElement.innerHTML = frontHTML;
        benchElement.setAttribute('data-revealed', 'true');
        setTimeout(() => benchElement.classList.remove('flip-reveal'), 400);
    }

    function renderAllTeams(blueTeam, redTeam, substitutes) {
        const blueGrid = document.getElementById('blueTeamGrid');
        const redGrid = document.getElementById('redTeamGrid');
        const benchContainer = document.getElementById('benchList');
        blueGrid.innerHTML = '';
        redGrid.innerHTML = '';
        benchContainer.innerHTML = '';
        blueTeam.forEach(p => blueGrid.appendChild(createBackCard(p)));
        redTeam.forEach(p => redGrid.appendChild(createBackCard(p)));
        if (!substitutes || substitutes.length === 0) {
            benchContainer.innerHTML = '<div class="bench-player" style="justify-content:center; padding:0.4rem 1rem;">✨ 无替补，全员出征 ✨</div>';
        } else {
            substitutes.forEach(p => benchContainer.appendChild(createBackBench(p)));
        }
        document.querySelectorAll('#blueTeamGrid .player-card, #redTeamGrid .player-card').forEach(card => {
            card.removeEventListener('click', cardClickHandler);
            card.addEventListener('click', cardClickHandler);
        });
        document.querySelectorAll('#benchList .bench-player').forEach(bench => {
            bench.removeEventListener('click', benchClickHandler);
            bench.addEventListener('click', benchClickHandler);
        });
    }

    function cardClickHandler(e) { revealPlayerCard(e.currentTarget); }
    function benchClickHandler(e) { revealBenchCard(e.currentTarget); }

    function randomizeAndReset() {
        const teams = generateTeamsFromOnline();
        if (!teams) return;
        renderAllTeams(teams.blueTeam, teams.redTeam, teams.substitutes);
        const btn = document.getElementById('randomizeBtn');
        btn.style.transform = 'scale(0.97)';
        setTimeout(() => btn.style.transform = '', 120);
        console.log("[随机组队] 基于在线池分组完成");
    }

    function buildCheckboxList() {
        const container = document.getElementById('playersCheckList');
        container.innerHTML = '';
        PLAYERS_DATA.forEach(player => {
            const item = document.createElement('div');
            item.className = 'check-item';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = `cb_${escapeHtml(player.id)}`;
            cb.checked = onlineStatus.get(player.id) === true;
            cb.addEventListener('change', (e) => {
                onlineStatus.set(player.id, e.target.checked);
                updateOnlineUI();
            });
            const label = document.createElement('label');
            label.htmlFor = cb.id;
            label.innerText = player.id;
            item.appendChild(cb);
            item.appendChild(label);
            container.appendChild(item);
        });
    }

    function selectAll(checked) {
        PLAYERS_DATA.forEach(p => onlineStatus.set(p.id, checked));
        PLAYERS_DATA.forEach(p => {
            const cb = document.getElementById(`cb_${escapeHtml(p.id)}`);
            if (cb) cb.checked = checked;
        });
        updateOnlineUI();
    }

    function init() {
        initOnlineStatus();
        buildCheckboxList();
        updateOnlineUI();
        const teams = generateTeamsFromOnline();
        if (teams) renderAllTeams(teams.blueTeam, teams.redTeam, teams.substitutes);
        document.getElementById('randomizeBtn').addEventListener('click', randomizeAndReset);
        document.getElementById('selectAllBtn').addEventListener('click', () => selectAll(true));
        document.getElementById('deselectAllBtn').addEventListener('click', () => selectAll(false));
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
